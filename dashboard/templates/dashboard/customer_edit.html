{% extends 'base.html' %}
{% block title %}Editar Cliente{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="page-title mb-0"><i class="bi bi-pencil me-2"></i>Editar Cliente {{ customer.meter_number }}</h4>
    <a href="{% url 'dashboard:customer_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Voltar</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" value="{{ customer.user.username }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="text" class="form-control" value="{{ customer.user.email }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nº do Contador</label>
                            <input type="text" name="meter_number" class="form-control" value="{{ customer.meter_number }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tipo de Cliente</label>
                            <select name="customer_type" class="form-select">
                                <option value="prepaid" {% if customer.customer_type == 'prepaid' %}selected{% endif %}>Pré-pago</option>
                                <option value="postpaid" {% if customer.customer_type == 'postpaid' %}selected{% endif %}>Pós-pago</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Saldo Actual (Kz)</label>
                            <input type="number" name="current_balance" class="form-control" step="0.01" value="{{ customer.current_balance }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Dívida (Kz)</label>
                            <input type="number" name="debt" class="form-control" step="0.01" value="{{ customer.debt }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <input type="text" name="phone" class="form-control" value="{{ customer.phone }}" placeholder="+244 9XX XXX XXX">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Província</label>
                            <input type="text" name="province" class="form-control" value="{{ customer.province }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Município</label>
                            <input type="text" name="municipio" class="form-control" value="{{ customer.municipio }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Endereço</label>
                            <textarea name="address" class="form-control" rows="2">{{ customer.address }}</textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-circle"></i> Salvar Alterações</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
