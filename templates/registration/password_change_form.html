{% extends 'base.html' %}
{% block title %}Alterar Senha{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="mb-4">
                    <h4 class="fw-bold text-dark"><i class="bi bi-shield-lock me-2"></i>Alterar Senha</h4>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_old_password" class="form-label">Senha atual</label>
                        <input type="password" name="old_password" id="id_old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">Nova senha</label>
                        <input type="password" name="new_password1" id="id_new_password1" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password2" class="form-label">Confirmar nova senha</label>
                        <input type="password" name="new_password2" id="id_new_password2" class="form-control" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Alterar senha
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
