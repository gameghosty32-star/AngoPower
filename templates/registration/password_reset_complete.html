{% extends 'base.html' %}
{% block title %}Senha Redefinida{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-check-circle" style="font-size:3rem;color:#2e7d32"></i>
                <h4 class="mt-3 fw-bold text-dark">Senha Redefinida</h4>
                <p class="text-muted">Sua senha foi alterada com sucesso!</p>
                <a href="{% url 'login' %}" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Fazer login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
