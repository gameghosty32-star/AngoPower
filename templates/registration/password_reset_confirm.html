{% extends 'base.html' %}
{% block title %}Nova Senha{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock" style="font-size:3rem;color:#1a237e"></i>
                    <h4 class="mt-2 fw-bold text-dark">Redefinir Senha</h4>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_new_password1" class="form-label">Nova senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="new_password1" id="id_new_password1" class="form-control" required placeholder="Nova senha">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="id_new_password2" class="form-label">Confirmar nova senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="new_password2" id="id_new_password2" class="form-control" required placeholder="Confirme a senha">
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Redefinir senha
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
