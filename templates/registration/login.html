{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-lightning-fill" style="font-size:3rem;color:#dc3545"></i>
                    <h4 class="mt-2 fw-bold text-dark">ENDE Platform</h4>
                    <p class="text-muted">Acesse sua conta</p>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="username" name="username" class="form-control" required placeholder="Seu nome de usuário">
                            <div class="invalid-feedback">Informe seu nome de usuário.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" name="password" class="form-control" required placeholder="Sua senha">
                            <div class="invalid-feedback">Informe sua senha.</div>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                    </div>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-1"><a href="{% url 'password_reset' %}" class="text-decoration-none">Esqueceu a senha?</a></p>
                    <p class="mb-0">Não tem conta? <a href="{% url 'register' %}" class="text-decoration-none">Cadastre-se</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
