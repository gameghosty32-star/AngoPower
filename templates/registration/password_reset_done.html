{% extends 'base.html' %}
{% block title %}E-mail Enviado{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="bi bi-envelope-check" style="font-size:3rem;color:#2e7d32"></i>
                <h4 class="mt-3 fw-bold text-dark">E-mail Enviado</h4>
                <p class="text-muted">Se existir uma conta com este e-mail, você receberá instruções para redefinir sua senha.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">
                    <i class="bi bi-arrow-left"></i> Voltar ao login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
