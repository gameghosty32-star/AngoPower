{% extends 'base.html' %}
{% block title %}Recuperar Senha{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-key" style="font-size:3rem;color:#1a237e"></i>
                    <h4 class="mt-2 fw-bold text-dark">Recuperar Senha</h4>
                    <p class="text-muted">Digite seu e-mail para receber o link de redefinição</p>
                </div>
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" id="id_email" class="form-control" required placeholder="seu@email.com">
                            <div class="invalid-feedback">Informe seu e-mail.</div>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send"></i> Enviar link
                        </button>
                    </div>
                </form>
                <hr class="my-4">
                <p class="text-center mb-0">
                    <a href="{% url 'login' %}" class="text-decoration-none">Voltar ao login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
