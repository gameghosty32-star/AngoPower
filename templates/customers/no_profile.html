{% extends 'base.html' %}
{% block title %}Sem Perfil{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm text-center">
            <div class="card-body py-5">
                <i class="bi bi-person-x" style="font-size:4rem;color:#dc3545"></i>
                <h4 class="mt-3 text-danger">Perfil não encontrado</h4>
                <p class="text-muted">Você ainda não possui um perfil de cliente. Entre em contato com um administrador para configurar sua conta.</p>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-box-arrow-right"></i> Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
